# SQLite for development and test; PostgreSQL for production.
#
# Production uses a single PostgreSQL database (DATABASE_URL) shared across
# all Solid components (cache, queue, cable) to stay within Render's free tier.

default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  adapter: sqlite3
  timeout: 5000
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  adapter: sqlite3
  timeout: 5000
  database: storage/test.sqlite3

# All production databases point to the same PostgreSQL instance (DATABASE_URL).
# Solid Cache, Queue, and Cable migrations run on the same database via their
# respective migrations_paths.
production:
  primary: &production_primary
    <<: *default
    adapter: postgresql
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *production_primary
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_primary
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_primary
    migrations_paths: db/cable_migrate
