# Render Blueprint — https://render.com/docs/blueprint-spec
#
# IMPORTANT: Before deploying, set the RAILS_MASTER_KEY environment variable
# in the Render dashboard (Dashboard → Service → Environment).
# Get the value from config/master.key (never commit this file).

databases:
  - name: kykapu-db
    databaseName: kykapu
    plan: free
    region: oregon

services:
  - type: web
    name: kykapu
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kykapu-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: RAILS_ASSUME_SSL
        value: "true"
      - key: RAILS_FORCE_SSL
        value: "true"
